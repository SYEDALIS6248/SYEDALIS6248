<!-- Omnitrix-style tech carousel SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      :root{
        --bg: transparent;
        --face: #0b0b0b;
        --accent: #1db954; /* green accent */
        --muted: #9aa0a6;
        --text: #ffffff;
        --item-w: 160;
        --cycle: 14s;
      }
      svg{background:var(--bg);}
      .watch{
        transform-origin:300px 150px;
      }
      .face{fill:var(--face); stroke:#222; stroke-width:2;}
      .ring{fill:none; stroke:#222; stroke-width:6;}
      .accent{fill:var(--accent);}
      .diamond{fill:var(--accent);}
      .label{fill:var(--text); font-family:Inter, Arial, sans-serif; font-size:14px; text-anchor:middle;}
      .tech-group{opacity:1;}
      .item{
        transform-origin:300px 150px;
        animation: slide var(--cycle) linear infinite;
      }
      /* staggered delays for 8 items */
      .item.i1{animation-delay: 0s;}
      .item.i2{animation-delay: calc(var(--cycle) * -0.125);}
      .item.i3{animation-delay: calc(var(--cycle) * -0.25);}
      .item.i4{animation-delay: calc(var(--cycle) * -0.375);}
      .item.i5{animation-delay: calc(var(--cycle) * -0.5);}
      .item.i6{animation-delay: calc(var(--cycle) * -0.625);}
      .item.i7{animation-delay: calc(var(--cycle) * -0.75);}
      .item.i8{animation-delay: calc(var(--cycle) * -0.875);}

      @keyframes slide{
        0%   { transform: translateX(220px) scale(0.8); opacity:0; }
        8%   { transform: translateX(80px) scale(0.95); opacity:1; }
        20%  { transform: translateX(0px) scale(1); opacity:1; }
        32%  { transform: translateX(-80px) scale(0.95); opacity:1; }
        40%  { transform: translateX(-220px) scale(0.8); opacity:0; }
        100% { transform: translateX(-220px) scale(0.8); opacity:0; }
      }

      /* small icon shapes styling */
      .icon-fill{fill:var(--muted);}
      .icon-accent{fill:var(--accent);}
    </style>
  </defs>

  <!-- watch body -->
  <g class="watch">
    <circle cx="300" cy="150" r="110" class="face"/>
    <circle cx="300" cy="150" r="140" class="ring"/>
    <!-- segmented inner ring -->
    <g transform="translate(300,150)">
      <circle r="92" fill="#0f0f0f"/>
      <g fill="none" stroke="#222" stroke-width="6">
        <circle r="92"/>
      </g>
      <!-- diamond/hourglass motif -->
      <g transform="translate(0,0)">
        <polygon class="diamond" points="0,-28 18,0 0,28 -18,0"/>
        <rect x="-6" y="-2" width="12" height="4" fill="#0b0b0b"/>
      </g>
    </g>
  </g>

  <!-- tech carousel area (centered over watch face) -->
  <g transform="translate(300,150)">
    <!-- placeholder ring to align items (invisible) -->
    <rect x="-220" y="-40" width="440" height="80" fill="none"/>

    <!-- Item 1: Java (coffee cup icon + label) -->
    <g class="tech-group item i1" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <!-- coffee cup simple -->
        <rect x="-18" y="-10" width="36" height="22" rx="4" class="icon-fill"/>
        <path d="M6 -10 q6 -8 0 -14" stroke="#c76c00" stroke-width="2" fill="none"/>
        <text class="label" x="0" y="36">Java</text>
      </g>
    </g>

    <!-- Item 2: Python (snake head shape + label) -->
    <g class="tech-group item i2" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <g transform="translate(0,0) scale(0.9)">
          <circle cx="-10" cy="-2" r="10" class="icon-accent"/>
          <circle cx="12" cy="6" r="10" class="icon-fill"/>
          <circle cx="-12" cy="-4" r="2" fill="#0b0b0b"/>
          <circle cx="14" cy="8" r="2" fill="#0b0b0b"/>
        </g>
        <text class="label" x="0" y="36">Python</text>
      </g>
    </g>

    <!-- Item 3: Spring (leaf) -->
    <g class="tech-group item i3" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <path d="M-10,6 C-2,0 8,-8 18,-12" stroke="var(--accent)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <text class="label" x="0" y="36">Spring</text>
      </g>
    </g>

    <!-- Item 4: Flask -->
    <g class="tech-group item i4" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <path d="M-6,-12 L6,-12 L10,6 C6,12 -6,12 -10,6 Z" fill="#9aa0a6"/>
        <rect x="-4" y="-18" width="8" height="6" fill="#9aa0a6"/>
        <text class="label" x="0" y="36">Flask</text>
      </g>
    </g>

    <!-- Item 5: MySQL -->
    <g class="tech-group item i5" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <rect x="-22" y="-10" width="44" height="20" rx="3" fill="#2b7bb9"/>
        <text class="label" x="0" y="36">MySQL</text>
      </g>
    </g>

    <!-- Item 6: SQLite -->
    <g class="tech-group item i6" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <circle cx="0" cy="0" r="12" fill="#6c8ebf"/>
        <text class="label" x="0" y="36">SQLite</text>
      </g>
    </g>

    <!-- Item 7: GCP -->
    <g class="tech-group item i7" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <g transform="translate(0,0) scale(0.9)">
          <rect x="-18" y="-10" width="12" height="8" fill="#fbbc05"/>
          <rect x="6" y="-10" width="12" height="8" fill="#ea4335"/>
          <rect x="-6" y="2" width="12" height="8" fill="#34a853"/>
        </g>
        <text class="label" x="0" y="36">GCP</text>
      </g>
    </g>

    <!-- Item 8: Node -->
    <g class="tech-group item i8" transform="translate(0,0)">
      <g transform="translate(120,0)">
        <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#0b0b0b" stroke="#222" />
        <circle cx="0" cy="0" r="12" fill="#3c873a"/>
        <text class="label" x="0" y="36">Node</text>
      </g>
    </g>

  </g>
</svg>
