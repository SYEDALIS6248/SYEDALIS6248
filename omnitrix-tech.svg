<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      :root{
        --bg: transparent;
        --face: #0b0b0b;
        --ring: #111;
        --accent: #1db954;
        --text: #e6f7ff;
        --cycle: 16s;
      }
      svg{background:var(--bg);}
      .watch-face{fill:var(--face); stroke:var(--ring); stroke-width:3;}
      .outer-ring{fill:none; stroke:var(--ring); stroke-width:8; opacity:0.9;}
      .inner-ring{fill:none; stroke:#0d0d0d; stroke-width:6;}
      .diamond{fill:var(--accent);}
      .label{fill:var(--text); font-family:Inter, Arial, sans-serif; font-size:13px; text-anchor:middle;}
      .item-box{fill:#0f0f0f; stroke:#222; rx:12;}
      .tech-group{opacity:1;}
      .item{
        transform-origin:350px 160px;
        animation: slide var(--cycle) linear infinite;
      }
      .item.i1{animation-delay: 0s;}
      .item.i2{animation-delay: calc(var(--cycle) * -0.125);}
      .item.i3{animation-delay: calc(var(--cycle) * -0.25);}
      .item.i4{animation-delay: calc(var(--cycle) * -0.375);}
      .item.i5{animation-delay: calc(var(--cycle) * -0.5);}
      .item.i6{animation-delay: calc(var(--cycle) * -0.625);}
      .item.i7{animation-delay: calc(var(--cycle) * -0.75);}
      .item.i8{animation-delay: calc(var(--cycle) * -0.875);}
      @keyframes slide{
        0%   { transform: translateX(260px) scale(0.85); opacity:0; }
        6%   { transform: translateX(120px) scale(0.92); opacity:0.6; }
        12%  { transform: translateX(0px) scale(1); opacity:1; }
        30%  { transform: translateX(0px) scale(1); opacity:1; }
        36%  { transform: translateX(-120px) scale(0.92); opacity:0.6; }
        40%  { transform: translateX(-260px) scale(0.85); opacity:0; }
        100% { transform: translateX(-260px) scale(0.85); opacity:0; }
      }
      .title{fill:#bcdfff; font-family:Inter, Arial; font-size:14px; text-anchor:middle;}
    </style>
  </defs>

  <!-- Title -->
  <text x="350" y="28" class="title">Omnitrix Tech Stack</text>

  <!-- Omnitrix body -->
  <g transform="translate(350,160)">
    <circle cx="0" cy="0" r="120" class="watch-face"/>
    <circle cx="0" cy="0" r="150" class="outer-ring"/>
    <circle cx="0" cy="0" r="95" class="inner-ring"/>
    <g>
      <circle cx="0" cy="-120" r="6" fill="#0d0d0d"/>
      <circle cx="0" cy="120" r="6" fill="#0d0d0d"/>
      <circle cx="-120" cy="0" r="6" fill="#0d0d0d"/>
      <circle cx="120" cy="0" r="6" fill="#0d0d0d"/>
    </g>
    <g>
      <polygon class="diamond" points="0,-30 20,0 0,30 -20,0"/>
      <rect x="-6" y="-2" width="12" height="4" fill="#0b0b0b"/>
    </g>
  </g>

  <!-- Carousel items (each item shows centered one-by-one) -->
  <g transform="translate(0,0)">

    <!-- Java -->
    <g class="tech-group item i1">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/java.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Java</text>
      </g>
    </g>

    <!-- Python -->
    <g class="tech-group item i2">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/python.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Python</text>
      </g>
    </g>

    <!-- MySQL -->
    <g class="tech-group item i3">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/mysql.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">MySQL</text>
      </g>
    </g>

    <!-- SQLite -->
    <g class="tech-group item i4">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/sqlite.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">SQLite</text>
      </g>
    </g>

    <!-- HTML5 -->
    <g class="tech-group item i5">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/html5.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">HTML5</text>
      </g>
    </g>

    <!-- CSS3 -->
    <g class="tech-group item i6">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/css3.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">CSS3</text>
      </g>
    </g>

    <!-- JavaScript -->
    <g class="tech-group item i7">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/javascript.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">JavaScript</text>
      </g>
    </g>

    <!-- Spring Boot (use spring icon) -->
    <g class="tech-group item i8">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/spring.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Spring / Spring Boot</text>
      </g>
    </g>

    <!-- Additional items (J2EE, VSCode, Excel, Word, PowerPoint, PowerBI, Node) -->
    <g class="tech-group item i1" style="animation-delay: calc(var(--cycle) * -1.0);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/java.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">J2EE</text>
      </g>
    </g>

    <g class="tech-group item i2" style="animation-delay: calc(var(--cycle) * -1.125);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/visualstudiocode.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">VS Code</text>
      </g>
    </g>

    <g class="tech-group item i3" style="animation-delay: calc(var(--cycle) * -1.25);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/microsoftexcel.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Excel</text>
      </g>
    </g>

    <g class="tech-group item i4" style="animation-delay: calc(var(--cycle) * -1.375);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/microsoftword.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Word</text>
      </g>
    </g>

    <g class="tech-group item i5" style="animation-delay: calc(var(--cycle) * -1.5);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/microsoftpowerpoint.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">PowerPoint</text>
      </g>
    </g>

    <g class="tech-group item i6" style="animation-delay: calc(var(--cycle) * -1.625);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/microsoftpowerbi.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Power BI</text>
      </g>
    </g>

    <g class="tech-group item i7" style="animation-delay: calc(var(--cycle) * -1.75);">
      <g transform="translate(350,160)">
        <rect x="120" y="-36" width="220" height="72" class="item-box"/>
        <image href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/nodedotjs.svg" x="170" y="-20" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
        <text class="label" x="210" y="42">Node.js</text>
      </g>
    </g>

  </g>
</svg>
