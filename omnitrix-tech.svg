<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      :root{
        --bg: transparent;
        --face: #0b0b0b;
        --ring: #1a1a1a;
        --accent: #1db954;
        --muted: #9aa0a6;
        --text: #ffffff;
        --item-w: 180px;
        --cycle: 14s;
      }
      svg{background:var(--bg);}
      .watch-face{fill:var(--face); stroke:var(--ring); stroke-width:3;}
      .outer-ring{fill:none; stroke:var(--ring); stroke-width:8;}
      .inner-ring{fill:none; stroke:#111; stroke-width:6;}
      .accent{fill:var(--accent);}
      .diamond{fill:var(--accent);}
      .label{fill:var(--text); font-family:Inter, Arial, sans-serif; font-size:13px; text-anchor:middle;}
      .item-box{fill:#0f0f0f; stroke:#222; rx:10;}
      .icon-fill{fill:var(--muted);}
      .icon-accent{fill:var(--accent);}
      .tech-group{opacity:1;}
      .item{
        transform-origin:350px 160px;
        animation: slide var(--cycle) linear infinite;
      }
      .item.i1{animation-delay: 0s;}
      .item.i2{animation-delay: calc(var(--cycle) * -0.125);}
      .item.i3{animation-delay: calc(var(--cycle) * -0.25);}
      .item.i4{animation-delay: calc(var(--cycle) * -0.375);}
      .item.i5{animation-delay: calc(var(--cycle) * -0.5);}
      .item.i6{animation-delay: calc(var(--cycle) * -0.625);}
      .item.i7{animation-delay: calc(var(--cycle) * -0.75);}
      .item.i8{animation-delay: calc(var(--cycle) * -0.875);}

      @keyframes slide{
        0%   { transform: translateX(260px) scale(0.85); opacity:0; }
        8%   { transform: translateX(100px) scale(0.95); opacity:1; }
        20%  { transform: translateX(0px) scale(1); opacity:1; }
        32%  { transform: translateX(-100px) scale(0.95); opacity:1; }
        40%  { transform: translateX(-260px) scale(0.85); opacity:0; }
        100% { transform: translateX(-260px) scale(0.85); opacity:0; }
      }
    </style>
  </defs>

  <!-- Title (optional, invisible on light backgrounds) -->
  <text x="350" y="28" fill="#cfd8dc" font-family="Inter, Arial" font-size="14" text-anchor="middle">Omnitrix Tech Stack Animation</text>

  <!-- Watch / Omnitrix body (centered) -->
  <g transform="translate(350,160)">
    <circle cx="0" cy="0" r="120" class="watch-face"/>
    <circle cx="0" cy="0" r="150" class="outer-ring"/>
    <circle cx="0" cy="0" r="95" class="inner-ring"/>

    <!-- decorative nodes -->
    <g>
      <circle cx="0" cy="-120" r="6" fill="#111"/>
      <circle cx="0" cy="120" r="6" fill="#111"/>
      <circle cx="-120" cy="0" r="6" fill="#111"/>
      <circle cx="120" cy="0" r="6" fill="#111"/>
    </g>

    <!-- central diamond/hourglass motif (Omnitrix-inspired, stylized) -->
    <g>
      <polygon class="diamond" points="0,-30 20,0 0,30 -20,0"/>
      <rect x="-6" y="-2" width="12" height="4" fill="#0b0b0b"/>
    </g>
  </g>

  <!-- Carousel area (items slide across center) -->
  <g transform="translate(0,0)">
    <!-- invisible alignment box -->
    <rect x="70" y="110" width="560" height="100" fill="none"/>

    <!-- Item template positions (all items share same layout; only translateX changes via animation) -->

    <!-- Java -->
    <g class="tech-group item i1">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <!-- simple coffee cup icon -->
        <g transform="translate(200,0) scale(1)">
          <rect x="-18" y="-10" width="36" height="22" rx="4" class="icon-fill"/>
          <path d="M6 -10 q6 -8 0 -14" stroke="#c76c00" stroke-width="2" fill="none"/>
        </g>
        <text class="label" x="210" y="36">Java</text>
      </g>
    </g>

    <!-- Python -->
    <g class="tech-group item i2">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <g transform="translate(200,0) scale(1)">
          <circle cx="-10" cy="-2" r="10" class="icon-accent"/>
          <circle cx="12" cy="6" r="10" class="icon-fill"/>
          <circle cx="-12" cy="-4" r="2" fill="#0b0b0b"/>
          <circle cx="14" cy="8" r="2" fill="#0b0b0b"/>
        </g>
        <text class="label" x="210" y="36">Python</text>
      </g>
    </g>

    <!-- Spring -->
    <g class="tech-group item i3">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <path d="M260,150 C268,140 280,128 300,120" transform="translate(-160,-150)" stroke="var(--accent)" stroke-width="4" fill="none" stroke-linecap="round"/>
        <text class="label" x="210" y="36">Spring</text>
      </g>
    </g>

    <!-- Flask -->
    <g class="tech-group item i4">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <g transform="translate(200,0) scale(1)">
          <path d="M-6,-12 L6,-12 L10,6 C6,12 -6,12 -10,6 Z" fill="#9aa0a6"/>
          <rect x="-4" y="-18" width="8" height="6" fill="#9aa0a6"/>
        </g>
        <text class="label" x="210" y="36">Flask</text>
      </g>
    </g>

    <!-- MySQL -->
    <g class="tech-group item i5">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <rect x="170" y="-10" width="44" height="20" rx="3" fill="#2b7bb9"/>
        <text class="label" x="210" y="36">MySQL</text>
      </g>
    </g>

    <!-- SQLite -->
    <g class="tech-group item i6">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <circle cx="200" cy="0" r="12" fill="#6c8ebf"/>
        <text class="label" x="210" y="36">SQLite</text>
      </g>
    </g>

    <!-- GCP -->
    <g class="tech-group item i7">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <g transform="translate(200,0) scale(0.9)">
          <rect x="-18" y="-10" width="12" height="8" fill="#fbbc05"/>
          <rect x="6" y="-10" width="12" height="8" fill="#ea4335"/>
          <rect x="-6" y="2" width="12" height="8" fill="#34a853"/>
        </g>
        <text class="label" x="210" y="36">GCP</text>
      </g>
    </g>

    <!-- Node -->
    <g class="tech-group item i8">
      <g transform="translate(350,160)">
        <rect x="120" y="-30" width="180" height="60" class="item-box"/>
        <circle cx="200" cy="0" r="12" fill="#3c873a"/>
        <text class="label" x="210" y="36">Node</text>
      </g>
    </g>

  </g>
</svg>
